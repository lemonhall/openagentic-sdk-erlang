<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OpenAgentic - 统一信箱｜集中处理案卷消息</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <link rel="stylesheet" href="/assets/case-governance.css" />
  </head>
  <body>
    <div class="app caseApp">
      <header class="topbar">
        <div class="brand">OpenAgentic</div>
        <nav class="topnav" aria-label="一级导航">
          <a class="btn" href="/">Workflow</a>
          <a class="btn" href="/view/cases.html">Cases</a>
          <a class="btn" id="inboxLink" href="/view/inbox.html" aria-current="page">Inbox <span class="navUnreadBadge" id="inboxUnreadBadge" hidden>0</span></a>
        </nav>
        <div class="subtitle">统一信箱：集中查看案卷消息；处理后可返回原页面继续工作。</div>
        <a class="btn isHidden" id="inboxReturnLink" href="/view/cases.html">返回上一级</a>
      </header>

      <main class="caseMain">
        <section class="casePanel casePanelWide">
          <div class="panelTitle">筛选</div>
          <form id="inboxFilterForm" class="caseFormGrid">
            <label>
              <span>状态</span>
              <select id="inboxStatus">
                <option value="all">全部</option>
                <option value="unread">未读</option>
                <option value="read">已读</option>
                <option value="archived">已归档</option>
              </select>
            </label>
            <div class="caseActions">
              <button type="submit" class="btn primary">刷新</button>
            </div>
            <div class="hint span2" id="inboxHint">先按状态筛选，再处理案卷消息。</div>
            <details class="contextHelp span2" id="inboxGuide">
              <summary>查看信箱说明</summary>
              <div class="contextHelpBody">
                <p>统一信箱集中展示各案卷消息，可直接标记已读或归档。</p>
                <p>处理完成后，可通过顶部返回入口回到原页面继续工作。</p>
              </div>
            </details>
          </form>
        </section>

        <section class="casePanel casePanelWide">
          <div class="panelTitle">全局案卷消息</div>
          <div id="globalMailList" class="entityList empty">暂无案卷消息</div>
        </section>
      </main>
    </div>

    <script src="/assets/inbox.js"></script>
      <script src="/assets/topbar.js"></script>
  </body>
</html>
