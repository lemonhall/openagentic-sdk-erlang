<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OpenAgentic · 文档查看</title>
    <link rel="stylesheet" href="/assets/app.css" />
    <style>
      .wrap { height: 100vh; display: flex; flex-direction: column; }
      .docHeader { padding: 12px 16px; border-bottom: 1px solid var(--border-default); background: rgba(15, 20, 25, 0.8); backdrop-filter: blur(20px) saturate(180%); }
      .docHeader .path { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); word-break: break-all; }
      .docHeader .actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
      .docBody { flex: 1; overflow: auto; padding: 18px 20px; }
      .docBody .md { max-width: 980px; margin: 0 auto; }
      .docBody pre { background: var(--surface-2); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 14px; overflow: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; }
      .docBody code { font-family: var(--font-mono); font-size: 0.95em; }
      .docBody h1, .docBody h2, .docBody h3 { margin: 14px 0 10px; line-height: 1.3; }
      .docBody p { margin: 10px 0; color: var(--text-secondary); }
      .docBody ul, .docBody ol { margin: 10px 0 10px 22px; color: var(--text-secondary); }
      .docBody a { color: var(--accent-primary); text-decoration: none; }
      .docBody a:hover { text-decoration: underline; }
      .docBody blockquote { margin: 12px 0; padding: 10px 12px; border-left: 3px solid var(--border-strong); background: var(--surface-2); border-radius: var(--radius-md); color: var(--text-secondary); }
      .docBody table { border-collapse: collapse; width: 100%; margin: 14px 0; }
      .docBody th, .docBody td { border: 1px solid var(--border-default); padding: 8px 10px; color: var(--text-secondary); }
      .docBody th { background: var(--surface-2); color: var(--text-primary); }
      .error { color: var(--error); white-space: pre-wrap; font-family: var(--font-mono); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="docHeader">
        <div class="brand">OpenAgentic</div>
        <div class="path" id="docPath">loading...</div>
        <div class="actions">
          <a class="btn" href="/" target="_self">返回流程</a>
          <button class="btn primary" id="btnReload" type="button">刷新</button>
          <button class="btn" id="btnDownload" type="button">下载原文</button>
        </div>
      </header>
      <main class="docBody">
        <div class="md" id="doc"></div>
      </main>
    </div>

    <script src="/assets/marked.min.js"></script>
    <script src="/assets/workspace_view.js"></script>
  </body>
</html>
